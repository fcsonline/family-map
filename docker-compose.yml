services:
  family-map:
    build:
      context: .
      args:
        VITE_DATA_MODE: self-hosted
        VITE_GIT_COMMIT: ${VITE_GIT_COMMIT:-unknown}
    ports:
      - "8080:3001"
    environment:
      - PORT=3001
      - DATA_DIR=/data
    volumes:
      - family-map-data:/data
volumes:
  family-map-data:
